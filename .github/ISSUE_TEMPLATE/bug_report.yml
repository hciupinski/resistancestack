name: Bug report
description: Report a reproducible problem in ResistanceStack.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use SECURITY.md for private reporting.
  - type: input
    id: version
    attributes:
      label: ResistanceStack version
      description: Run `resistack --version` if you installed a release binary.
      placeholder: v0.1.1
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Affected command
      options:
        - init
        - wizard
        - doctor
        - inventory
        - audit
        - apply
        - deploy-user
        - status
        - rollback
        - ci
        - observability
        - release or packaging
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands and a minimal sanitized config when possible.
      placeholder: |
        1. Run `resistack ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Go version if built from source, VPS OS if relevant.
    validations:
      required: true
